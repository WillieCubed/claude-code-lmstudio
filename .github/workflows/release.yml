name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Create the GitHub release with the built artifacts (tag pushes only).
  github-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  # Publish to PyPI via Trusted Publishing (no token).
  # One-time setup: add a PyPI Trusted Publisher for this repo + workflow, then set
  # the repository variable PYPI_PUBLISH=true.
  pypi:
    needs: build
    if: ${{ vars.PYPI_PUBLISH == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  # Bump the formula in WillieCubed/homebrew-tap (tag pushes only).
  # One-time setup: add the HOMEBREW_TAP_TOKEN secret (push access to the tap) and set
  # the repository variable HOMEBREW_BUMP=true. The formula must already exist in the tap.
  homebrew:
    needs: build
    if: ${{ vars.HOMEBREW_BUMP == 'true' && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: claude-lms
          homebrew-tap: WillieCubed/homebrew-tap
          tag-name: ${{ github.ref_name }}
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
